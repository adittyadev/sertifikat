<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Form Sertifikat BPSDM</title>
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div class="container">
      <h2>Generator Sertifikat</h2>
      <p class="sub">BPSDM Provinsi Sumatera Barat</p>

      <div class="form-card">
        <div class="form-group">
          <label>Nama</label>
          <input type="text" id="nama" placeholder="Nama lengkap" />
        </div>
        <div class="form-group">
          <label>NIP/NRP</label>
          <input type="text" id="nip" placeholder="Nomor Induk Pegawai" />
        </div>
        <div class="form-group">
          <label>Instansi/Lembaga</label>
          <input type="text" id="instansi" placeholder="Nama instansi" />
        </div>
      </div>

      <button onclick="kirimData()">Generate Sertifikat</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
