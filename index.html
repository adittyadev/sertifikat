<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Form Sertifikat BPSDM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style></style>
  </head>
  <body>
    <div class="container">
      <div class="card-header">
        <div class="header-badge">
          <div class="badge-dot"></div>
          <span class="badge-text">BPSDM Sumatera Barat</span>
        </div>
        <h2>Generator<br />Sertifikat</h2>
        <p>Isi data penerima untuk membuat sertifikat resmi</p>
      </div>

      <div class="gold-bar"></div>

      <div class="card-body">
        <div class="field-row">
          <div class="field-label">
            <span class="star">✦</span> Nama Lengkap
          </div>
          <div class="field-wrap">
            <svg
              class="field-icon"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#1a3a6b"
              stroke-width="2"
              stroke-linecap="round"
            >
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
            <input type="text" id="nama" placeholder="Masukkan nama lengkap" />
          </div>
        </div>

        <div class="field-row">
          <div class="field-label"><span class="star">✦</span> NIP / NRP</div>
          <div class="field-wrap">
            <svg
              class="field-icon"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#1a3a6b"
              stroke-width="2"
              stroke-linecap="round"
            >
              <rect x="3" y="4" width="18" height="16" rx="2" />
              <path d="M8 10h8M8 14h5" />
            </svg>
            <input type="text" id="nip" placeholder="Nomor Induk Pegawai" />
          </div>
        </div>

        <div class="field-row">
          <div class="field-label">
            <span class="star">✦</span> Instansi / Lembaga
          </div>
          <div class="field-wrap">
            <svg
              class="field-icon"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#1a3a6b"
              stroke-width="2"
              stroke-linecap="round"
            >
              <path d="M3 21h18M6 21V7l6-4 6 4v14M9 21v-5h6v5" />
            </svg>
            <input
              type="text"
              id="instansi"
              placeholder="Nama instansi atau lembaga"
            />
          </div>
        </div>

        <div class="divider"></div>

        <button class="btn-submit" onclick="kirimData()">
          Generate Sertifikat
          <div class="btn-arrow">→</div>
        </button>
      </div>

      <div class="card-footer">
        <div class="footer-line"></div>
        <div class="footer-logo">
          <div class="logo-mark">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="#c9a227">
              <path d="M2 8V5l3-3 3 3v3H6V6H4v2z" />
            </svg>
          </div>
          Pemerintah Provinsi Sumatera Barat
        </div>
        <div class="footer-line"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
